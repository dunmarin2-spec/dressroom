<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MAGIC FIT - 하이엔드 핏 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #fff5f7; }
        
        .fitting-room { 
            position: relative; width: 300px; height: 500px; 
            background: #ffffff; border-radius: 60px; border: 10px solid #fff; 
            margin: 0 auto; overflow: hidden; box-shadow: 0 30px 60px rgba(244, 63, 94, 0.2); 
        }

        .base-mannequin { 
            position: absolute; top: 10%; left: 0; width: 100%; height: 80%; 
            z-index: 10; opacity: 0.15; fill: #f43f5e; display: flex; justify-content: center; 
        }

        /* 👕 레이어 및 위치 정밀 조정 */
        .layer { position: absolute; left: 0; width: 100%; display: flex; justify-content: center; pointer-events: none; }
        #top-fit { top: 12%; height: 45%; z-index: 30; }     
        #bottom-fit { top: 41%; height: 52%; z-index: 20; }  
        #shoes-fit { top: 84%; height: 16%; z-index: 40; }   

        /* 🌟 핵심: 입체감을 살리는 그림자 효과 */
        .cloth-img { 
            width: 95%; height: 100%; object-fit: contain; 
            filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.35)); /* 그림자를 더 깊고 진하게 */
        }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #f43f5e; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">
    
    <h1 class="text-4xl font-black text-rose-600 mb-8 italic uppercase tracking-tighter">AI MAGIC FIT</h1>

    <div class="fitting-room mb-8">
        <div class="base-mannequin">
            <svg viewBox="0 0 100 200" style="height: 100%;">
                <circle cx="50" cy="20" r="13" />
                <path d="M25,45 Q50,35 75,45 L70,95 Q50,85 30,95 Z" />
                <path d="M30,100 L70,100 L75,180 Q50,190 25,180 Z" />
            </svg>
        </div>
        <div id="bottom-fit" class="layer"></div>
        <div id="top-fit" class="layer"></div>
        <div id="shoes-fit" class="layer"></div>
    </div>

    <div class="w-full max-w-sm space-y-4 bg-white p-6 rounded-[2.5rem] shadow-xl">
        <input type="text" id="clothInput" placeholder="영어로 입력 (예: black shirt)" class="w-full p-4 rounded-2xl bg-rose-50 font-bold text-sm outline-none focus:ring-2 focus:ring-rose-400">
        <div class="flex gap-2">
            <select id="catSelect" class="flex-grow p-4 rounded-2xl bg-slate-50 font-bold text-rose-500 text-xs outline-none">
                <option value="top">상의 (TOP)</option>
                <option value="bottom">하의 (BOTTOM)</option>
                <option value="shoes">신발 (SHOES)</option>
            </select>
            <button onclick="makeMagic()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-xs active:scale-95 transition flex items-center justify-center gap-2">
                <span>생성</span><div id="spinner" class="loader"></div>
            </button>
        </div>
    </div>

    <script>
        async function makeMagic() {
            const prompt = document.querySelector('#clothInput').value;
            const category = document.querySelector('#catSelect').value;
            const spinner = document.querySelector('#spinner');
            
            if(!prompt) return alert("옷 이름을 영어로 적으십쇼 형님!");
            
            spinner.style.display = 'inline-block';
            console.log(`🚀 AI에게 [${prompt}] 고스트 마네킹 핏 생성 지시 완료!`);
            
            try {
                // 철저하게 숨겨진 Vercel 서버로 요청
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, category })
                });
                
                if (!response.ok) throw new Error("서버 응답 오류");

                const data = await response.json();
                
                // Vercel 타임아웃 방어기제가 작동해서 원본이 왔을 경우 경고창 띄우기
                if(data.fallback) {
                    alert("형님! 누끼 서버가 바빠서 배경을 못 지웠습니다. 버튼을 한 번 더 눌러주십쇼!");
                }

                if(data.img) {
                    const targetLayer = document.getElementById(`${category}-fit`);
                    targetLayer.innerHTML = `<img src="${data.img}" class="cloth-img animate-in zoom-in duration-700">`;
                }

            } catch (e) {
                console.error(e);
                alert("생성에 실패했습니다. 다시 시도해주십쇼.");
            } finally {
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
