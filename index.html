<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coordi Sim - 찬둥 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Nanum+Pen+Script&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #fff1f2; color: #4b5563; -webkit-tap-highlight-color: transparent; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #f43f5e; transform: rotate(-10deg) translateY(6px); margin-right: 4px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sim-slot { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .sim-active { transform: scale(1.05); background-color: #f43f5e !important; color: white !important; border-style: solid !important; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-24">

    <header class="text-center my-6 flex items-center justify-center">
        <span class="chan-doong-signature">찬둥의</span>
        <h1 class="text-3xl font-black text-rose-600 italic tracking-tighter leading-none uppercase">Coordi Simulator</h1>
    </header>

    <div class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl p-8 mb-8 border-b-[12px] border-rose-400 text-center relative">
        <p class="text-[10px] font-black text-rose-300 uppercase tracking-[0.3em] mb-6 underline decoration-rose-200">Simulation Board</p>
        
        <div class="flex flex-col items-center gap-2">
            <div id="sim-top" class="sim-slot w-48 h-16 flex items-center justify-center bg-rose-50 rounded-t-3xl rounded-b-lg text-rose-300 font-bold italic border-2 border-dashed border-rose-200 text-sm px-4">TOP</div>
            <div id="sim-bottom" class="sim-slot w-40 h-24 flex items-center justify-center bg-rose-50 rounded-lg text-rose-300 font-bold italic border-2 border-dashed border-rose-200 text-sm px-4">BOTTOM</div>
            <div id="sim-shoes" class="sim-slot w-32 h-12 flex items-center justify-center bg-rose-50 rounded-t-lg rounded-b-3xl text-rose-300 font-bold italic border-2 border-dashed border-rose-200 text-sm px-4">SHOES</div>
        </div>

        <div id="statusMsg" class="mt-6 text-xs font-black text-rose-400 italic min-h-[1rem]">코디를 조합해보십쇼 형님!</div>
        <button onclick="resetCoordi()" class="mt-4 text-[10px] font-bold text-slate-300 uppercase hover:text-rose-400 transition">Clear All</button>
    </div>

    <div class="w-full max-w-sm bg-white rounded-3xl p-5 shadow-md mb-6 border border-rose-100">
        <div class="flex gap-2 mb-3">
            <input type="text" id="itemName" placeholder="옷 이름 (예: 청바지)" class="flex-grow p-3 border rounded-xl text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-rose-400 font-semibold text-black">
            <select id="itemCategory" class="w-24 p-3 border rounded-xl text-xs bg-slate-50 outline-none font-bold text-rose-500">
                <option value="top">상의</option>
                <option value="bottom">하의</option>
                <option value="shoes">신발</option>
            </select>
        </div>
        <button onclick="addItem()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-black text-sm active:scale-95 transition shadow-lg uppercase italic tracking-tighter">Add to Dressroom</button>
    </div>

    <div class="w-full max-w-sm flex gap-2 mb-4 overflow-x-auto hide-scrollbar">
        <button onclick="filterCloset('all')" class="px-5 py-2.5 bg-rose-500 text-white rounded-full text-[11px] font-black italic shadow-lg">ALL</button>
        <button onclick="filterCloset('top')" class="px-5 py-2.5 bg-white text-rose-500 rounded-full text-[11px] font-black italic shadow-sm border border-rose-100">TOP</button>
        <button onclick="filterCloset('bottom')" class="px-5 py-2.5 bg-white text-rose-500 rounded-full text-[11px] font-black italic shadow-sm border border-rose-100">BOTTOM</button>
        <button onclick="filterCloset('shoes')" class="px-5 py-2.5 bg-white text-rose-500 rounded-full text-[11px] font-black italic shadow-sm border border-rose-100">SHOES</button>
    </div>

    <div class="w-full max-w-sm grid grid-cols-2 gap-4 mb-12" id="closetList"></div>

    <div class="w-full max-w-sm space-y-6 mb-10">
        <div class="text-center">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="inline-flex items-center gap-2 bg-[#FAE100] text-[#3C1E1E] px-8 py-4 rounded-2xl font-black text-xs shadow-md active:scale-95 transition">
                ☕ 찬둥에게 커피 후원하기
            </a>
        </div>
        <div class="bg-white border border-rose-100 rounded-[2rem] p-6 shadow-sm text-center">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                <input type="hidden" name="channel" value="AF4757238">
                <input type="text" name="q" placeholder="이 코디에 어울리는 가방 검색" class="flex-grow p-3 border rounded-xl text-xs bg-slate-50 outline-none text-black font-semibold">
                <button type="submit" class="bg-rose-500 text-white px-4 rounded-xl font-bold text-xs active:scale-95 transition">검색</button>
            </form>
            <p class="text-[9px] text-rose-300 mt-3 font-medium">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
        </div>
    </div>

    <script>
        let closet = JSON.parse(localStorage.getItem('chan_closet')) || [
            {id: 1, name: '크롭 티셔츠', category: 'top'},
            {id: 2, name: '와이드 데님', category: 'bottom'},
            {id: 3, name: '컨버스 하이', category: 'shoes'}
        ];

        let currentSim = { top: null, bottom: null, shoes: null };

        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const category = document.getElementById('itemCategory').value;
            if(!name) return alert("옷 이름을 적어주십쇼!");
            const newItem = { id: Date.now(), name, category };
            closet.push(newItem);
            localStorage.setItem('chan_closet', JSON.stringify(closet));
            renderCloset('all');
            document.getElementById('itemName').value = '';
        }

        function renderCloset(filter) {
            const list = document.getElementById('closetList');
            list.innerHTML = '';
            const filtered = filter === 'all' ? closet : closet.filter(i => i.category === filter);

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl shadow-sm border border-rose-50 flex flex-col items-center text-center animate-in fade-in slide-in-from-bottom-2 duration-300";
                div.innerHTML = `
                    <p class="text-[8px] font-black text-rose-300 uppercase mb-1 tracking-widest">${item.category}</p>
                    <p class="font-bold text-slate-700 text-xs mb-4 h-8 overflow-hidden line-clamp-2">${item.name}</p>
                    <div class="flex gap-2">
                        <button onclick="simulate('${item.category}', '${item.name}')" class="bg-rose-50 text-rose-500 border border-rose-200 px-3 py-1.5 rounded-full text-[10px] font-black uppercase active:bg-rose-500 active:text-white transition-all">Select</button>
                        <button onclick="deleteItem(${item.id})" class="text-slate-200 hover:text-rose-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function simulate(category, name) {
            const slot = document.getElementById(`sim-${category}`);
            slot.innerText = name;
            slot.classList.add('sim-active');
            currentSim[category] = name;
            checkComplete();
        }

        function checkComplete() {
            const msg = document.getElementById('statusMsg');
            if(currentSim.top && currentSim.bottom && currentSim.shoes) {
                msg.innerText = "✨ 대박! 오늘 코디 완전 찢었습니다 형님! ✨";
                msg.className = "mt-6 text-sm font-black text-rose-600 animate-bounce italic";
            } else {
                msg.innerText = "조금만 더 조합해 보십쇼!";
            }
        }

        function deleteItem(id) {
            if(confirm("이 옷을 삭제할까요?")) {
                closet = closet.filter(i => i.id !== id);
                localStorage.setItem('chan_closet', JSON.stringify(closet));
                renderCloset('all');
            }
        }

        function filterCloset(cat) { renderCloset(cat); }
        function resetCoordi() { location.reload(); }

        renderCloset('all');
    </script>
</body>
</html>
