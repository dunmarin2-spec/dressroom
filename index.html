<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coordi Sim - 리얼 마네킹</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Nanum+Pen+Script&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #fff5f7; color: #4b5563; overflow-x: hidden; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #f43f5e; transform: rotate(-10deg) translateY(6px); margin-right: 4px; }
        
        /* ✨ 마네킹 시뮬레이션 핵심 스타일 */
        .mannequin-container { position: relative; width: 220px; height: 350px; background: #ffe4e6; border-radius: 100px 100px 40px 40px; margin: 0 auto; border: 4px solid #fecdd3; overflow: hidden; }
        .mannequin-head { width: 50px; height: 60px; background: #fda4af; border-radius: 50%; margin: 20px auto 10px; }
        
        /* 옷들이 입혀지는 레이어 */
        .clothing-layer { position: absolute; left: 50%; transform: translateX(-50%); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; text-align: center; font-size: 11px; font-weight: 900; color: white; padding: 10px; }
        
        #layer-top { top: 85px; width: 180px; height: 100px; background: rgba(244, 63, 94, 0.1); border: 2px dashed #fb7185; border-radius: 20px; z-index: 10; }
        #layer-bottom { top: 180px; width: 140px; height: 120px; background: rgba(244, 63, 94, 0.05); border: 2px dashed #fda4af; border-radius: 10px; z-index: 5; }
        #layer-shoes { top: 300px; width: 120px; height: 40px; background: rgba(244, 63, 94, 0.05); border: 2px dashed #fecdd3; border-radius: 5px; z-index: 15; }

        /* 옷이 입혀졌을 때의 효과 */
        .dressed { background: #f43f5e !important; border-style: solid !important; box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.4); transform: translateX(-50%) scale(1.05) !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-24">

    <header class="text-center my-6 flex items-center justify-center">
        <span class="chan-doong-signature">찬둥의</span>
        <h1 class="text-3xl font-black text-rose-600 italic tracking-tighter uppercase">Coordi Sim</h1>
    </header>

    <div class="w-full max-w-sm bg-white rounded-[3rem] shadow-2xl p-6 mb-8 border-b-[12px] border-rose-300 text-center">
        <p class="text-[10px] font-black text-rose-300 uppercase tracking-[0.3em] mb-4">Real-fit Simulation</p>
        
        <div class="mannequin-container shadow-inner">
            <div class="mannequin-head"></div>
            <div id="layer-top" class="clothing-layer">상의 선택</div>
            <div id="layer-bottom" class="clothing-layer">하의 선택</div>
            <div id="layer-shoes" class="clothing-layer">신발 선택</div>
        </div>

        <div id="statusMsg" class="mt-6 text-xs font-black text-rose-400 italic italic">조합을 완성해보십쇼!</div>
        <button onclick="location.reload()" class="mt-4 text-[10px] font-bold text-slate-300 uppercase underline">Reset Fitting</button>
    </div>

    <div class="w-full max-w-sm bg-white rounded-3xl p-5 shadow-lg mb-6 border border-rose-50">
        <div class="flex gap-2">
            <input type="text" id="itemName" placeholder="옷 이름 (예: 청바지)" class="flex-grow p-3 border rounded-xl text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-rose-400 font-bold">
            <select id="itemCat" class="w-20 p-3 border rounded-xl text-xs bg-slate-50 font-bold text-rose-500">
                <option value="top">상의</option>
                <option value="bottom">하의</option>
                <option value="shoes">신발</option>
            </select>
            <button onclick="addItem()" class="bg-slate-800 text-white px-4 rounded-xl font-black text-xs active:scale-95 transition">추가</button>
        </div>
    </div>

    <div class="w-full max-w-sm flex gap-2 mb-4 overflow-x-auto hide-scrollbar">
        <button onclick="renderCloset('all')" class="px-5 py-2 bg-rose-500 text-white rounded-full text-[10px] font-black italic">ALL</button>
        <button onclick="renderCloset('top')" class="px-5 py-2 bg-white text-rose-500 rounded-full text-[10px] font-black italic shadow-sm border border-rose-100">TOP</button>
        <button onclick="renderCloset('bottom')" class="px-5 py-2 bg-white text-rose-500 rounded-full text-[10px] font-black italic shadow-sm border border-rose-100">BOTTOM</button>
        <button onclick="renderCloset('shoes')" class="px-5 py-2 bg-white text-rose-500 rounded-full text-[10px] font-black italic shadow-sm border border-rose-100">SHOES</button>
    </div>

    <div class="w-full max-w-sm grid grid-cols-2 gap-3 mb-10" id="closetList"></div>

    <script>
        let closet = JSON.parse(localStorage.getItem('chan_closet_v2')) || [
            {id:1, name:'핑크 가디건', category:'top'}, {id:2, name:'와이드 청바지', category:'bottom'}, {id:3, name:'반스 어센틱', category:'shoes'}
        ];

        function addItem() {
            const name = document.getElementById('itemName').value;
            const category = document.getElementById('itemCat').value;
            if(!name) return;
            closet.push({id: Date.now(), name, category});
            localStorage.setItem('chan_closet_v2', JSON.stringify(closet));
            renderCloset('all');
            document.getElementById('itemName').value = '';
        }

        function renderCloset(filter) {
            const list = document.getElementById('closetList');
            list.innerHTML = '';
            const filtered = filter === 'all' ? closet : closet.filter(i => i.category === filter);
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl border border-rose-50 shadow-sm text-center animate-in zoom-in duration-300";
                div.innerHTML = `
                    <p class="text-[8px] font-black text-rose-300 uppercase mb-1">${item.category}</p>
                    <p class="font-bold text-slate-700 text-xs mb-3 truncate">${item.name}</p>
                    <button onclick="wear('${item.category}', '${item.name}')" class="bg-rose-50 text-rose-600 px-4 py-1.5 rounded-lg text-[10px] font-black active:bg-rose-500 active:text-white transition">입어보기</button>
                `;
                list.appendChild(div);
            });
        }

        function wear(cat, name) {
            const layer = document.getElementById(`layer-${cat}`);
            layer.innerText = name;
            layer.classList.add('dressed');
            
            // 다 입었는지 체크
            const dressedCount = document.querySelectorAll('.dressed').length;
            if(dressedCount >= 3) {
                document.getElementById('statusMsg').innerText = "✨ 형수님, 오늘 코디가 예술입니다! ✨";
                document.getElementById('statusMsg').className = "mt-6 text-sm font-black text-rose-600 animate-bounce";
            }
        }

        renderCloset('all');
    </script>
</body>
</html>
