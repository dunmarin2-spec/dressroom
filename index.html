<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MAGIC FIT - 찬둥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fitting-room { position: relative; width: 280px; height: 450px; background: #fff1f2; border-radius: 50px; border: 8px solid #fff; margin: 0 auto; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .layer { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: contain; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #f43f5e; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-rose-50 p-6 flex flex-col items-center">
    <h1 class="text-3xl font-black text-rose-600 mb-8 italic uppercase tracking-tighter">AI MAGIC FIT</h1>

    <div class="fitting-room mb-6">
        <img src="https://i.imgur.com/7Yf0Z8V.png" class="layer opacity-20">
        <div id="bottom-fit" class="layer"></div>
        <div id="top-fit" class="layer"></div>
        <div id="shoes-fit" class="layer"></div>
    </div>

    <div class="w-full max-w-sm space-y-4">
        <input type="text" id="clothInput" placeholder="예: 핑크색 가디건" class="w-full p-4 rounded-2xl border-none shadow-lg font-bold text-sm outline-none">
        <div class="flex gap-2">
            <select id="catSelect" class="flex-grow p-3 rounded-xl border-none shadow-md font-bold text-rose-500 text-xs">
                <option value="top">TOP</option>
                <option value="bottom">BOTTOM</option>
                <option value="shoes">SHOES</option>
            </select>
            <button onclick="makeMagic()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-xs active:scale-95 transition flex items-center gap-2">
                생성하기 <div id="spinner" class="loader"></div>
            </button>
        </div>
    </div>

    <script>
        async function makeMagic() {
            const prompt = document.querySelector('#clothInput').value;
            const category = document.querySelector('#catSelect').value;
            const spinner = document.querySelector('#spinner');
            if(!prompt) return alert("옷 이름을 적으십쇼 형님!");

            spinner.style.display = 'inline-block';
            
            try {
                // Vercel의 /api/generate 경로로 요청 보냄
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, category })
                });
                
                const data = await response.json();
                if(data.img) {
                    document.getElementById(`${category}-fit`).innerHTML = `<img src="${data.img}" class="w-full h-full object-contain animate-in zoom-in duration-700">`;
                }
            } catch (e) {
                alert("형님, AI가 너무 바쁜가 봅니다. 잠시 후에 다시!");
            } finally {
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
