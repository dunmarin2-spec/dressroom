<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MAGIC FIT - 찬둥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .fitting-room { position: relative; width: 280px; height: 450px; background: #fff1f2; border-radius: 50px; border: 8px solid #fff; margin: 0 auto; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .layer { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: contain; display: flex; align-items: center; justify-content: center; }
        
        /* ✨ 코딩으로 만든 절대 안 깨지는 마네킹 실루엣 */
        .mannequin-svg { width: 180px; height: 350px; opacity: 0.15; fill: #f43f5e; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #f43f5e; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-rose-50 p-6 flex flex-col items-center">
    <h1 class="text-3xl font-black text-rose-600 mb-8 italic uppercase tracking-tighter">AI MAGIC FIT</h1>

    <div class="fitting-room mb-6">
        <div class="layer">
            <svg class="mannequin-svg" viewBox="0 0 100 200">
                <circle cx="50" cy="25" r="15" /> <path d="M20,50 Q50,40 80,50 L75,100 Q50,90 25,100 Z" /> <path d="M25,105 L75,105 L80,180 Q50,190 20,180 Z" /> </svg>
        </div>
        
        <div id="bottom-fit" class="layer"></div>
        <div id="top-fit" class="layer"></div>
        <div id="shoes-fit" class="layer"></div>
    </div>

    <div class="w-full max-w-sm space-y-4">
        <input type="text" id="clothInput" placeholder="예: 핑크색 가디건" class="w-full p-4 rounded-2xl border-none shadow-lg font-bold text-sm outline-none focus:ring-2 focus:ring-rose-400">
        <div class="flex gap-2">
            <select id="catSelect" class="flex-grow p-3 rounded-xl border-none shadow-md font-bold text-rose-500 text-xs">
                <option value="top">TOP</option>
                <option value="bottom">BOTTOM</option>
                <option value="shoes">SHOES</option>
            </select>
            <button onclick="makeMagic()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-xs active:scale-95 transition flex items-center justify-center gap-2">
                생성하기 <div id="spinner" class="loader"></div>
            </button>
        </div>
    </div>

    <script>
        async function makeMagic() {
            const prompt = document.querySelector('#clothInput').value;
            const category = document.querySelector('#catSelect').value;
            const spinner = document.querySelector('#spinner');
            if(!prompt) return alert("옷 이름을 적으십쇼 형님!");

            spinner.style.display = 'inline-block';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, category })
                });
                
                const data = await response.json();
                if(data.img) {
                    document.getElementById(`${category}-fit`).innerHTML = `<img src="${data.img}" class="w-full h-full object-contain animate-in zoom-in duration-700">`;
                }
            } catch (e) {
                alert("형님, 서버 연결을 확인해보십쇼!");
            } finally {
                spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
