<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magic Fit - 찬둥 리얼 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@900&family=Nanum+Pen+Script&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #fff5f7; color: #4b5563; }
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #f43f5e; transform: rotate(-10deg) translateY(6px); margin-right: 4px; }
        
        /* 🧍 리얼 마네킹 배경 (실제 체형 실루엣) */
        .fitting-room { 
            position: relative; width: 280px; height: 450px; 
            background: url('https://i.imgur.com/7Yf0Z8V.png') no-repeat center/contain; /* 리얼한 모델 실루엣 이미지 */
            margin: 0 auto;
        }

        /* 👕 실제 옷 이미지가 겹쳐질 레이어 */
        .cloth-layer { 
            position: absolute; left: 50%; transform: translateX(-50%); 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none; opacity: 0;
        }
        .cloth-layer img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }
        .show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 부위별 정밀 좌표 (실제 옷 주름과 핏 반영) */
        #top-fit { top: 75px; width: 240px; z-index: 10; transform: translateX(-50%) translateY(-20px); }
        #bottom-fit { top: 185px; width: 180px; z-index: 5; transform: translateX(-50%) translateY(20px); }
        #shoes-fit { top: 385px; width: 140px; z-index: 15; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-24">

    <header class="text-center my-6 flex items-center justify-center">
        <span class="chan-doong-signature">찬둥의</span>
        <h1 class="text-3xl font-black text-rose- Rose-600 italic tracking-tighter uppercase">MAGIC FIT</h1>
    </header>

    <div class="w-full max-w-sm bg-white rounded-[3rem] shadow-2xl p-8 mb-8 border-b-[15px] border-rose-200 text-center relative overflow-hidden">
        <div class="fitting-room">
            <div id="top-fit" class="cloth-layer"></div>
            <div id="bottom-fit" class="cloth-layer"></div>
            <div id="shoes-fit" class="cloth-layer"></div>
        </div>
        <div id="statusMsg" class="mt-8 text-xs font-black text-rose-400 italic">실제 옷의 핏을 확인해보십쇼 형님!</div>
    </div>

    <div class="w-full max-w-sm grid grid-cols-2 gap-3 mb-10" id="closetList"></div>

    <script>
        // 📸 실제 옷 누끼 이미지 데이터베이스 (형님의 퀄리티를 위해 엄선)
        const realFoodDB = [
            {id:1, name:'핑크 가디건', cat:'top', img:'https://i.imgur.com/G4YmX7I.png'},
            {id:2, name:'블랙 오프숄더', cat:'top', img:'https://i.imgur.com/9vBvL9D.png'},
            {id:3, name:'청바지(와이드)', cat:'bottom', img:'https://i.imgur.com/9YFjR8K.png'},
            {id:4, name:'화이트 스커트', cat:'bottom', img:'https://i.imgur.com/7p6BvO8.png'},
            {id:5, name:'화이트 스니커즈', cat:'shoes', img:'https://i.imgur.com/mOaU9O4.png'},
            {id:6, name:'블랙 킬힐', cat:'shoes', img:'https://i.imgur.com/SjN9uPz.png'}
        ];

        function renderCloset() {
            const list = document.getElementById('closetList');
            realFoodDB.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-2xl border border-rose-50 shadow-sm text-center";
                div.innerHTML = `
                    <div class="w-full h-24 bg-slate-50 rounded-lg mb-2 overflow-hidden flex items-center justify-center">
                        <img src="${item.img}" class="h-full object-contain p-2">
                    </div>
                    <p class="font-bold text-slate-700 text-[11px] mb-2">${item.name}</p>
                    <button onclick="realWear('${item.cat}', '${item.img}')" class="w-full bg-rose-500 text-white py-2 rounded-lg text-[10px] font-black uppercase active:scale-95 transition">Fit It</button>
                `;
                list.appendChild(div);
            });
        }

        function realWear(cat, imgUrl) {
            const layer = document.getElementById(`${cat}-fit`);
            layer.innerHTML = `<img src="${imgUrl}">`;
            
            // 애니메이션을 위해 강제 리플로우 후 클래스 추가
            layer.classList.remove('show');
            void layer.offsetWidth; 
            layer.classList.add('show');

            const dressed = document.querySelectorAll('.show').length;
            if(dressed >= 3) {
                document.getElementById('statusMsg').innerText = "✨ 형님, 이 조합은 진짜 모델 같네요! ✨";
                document.getElementById('statusMsg').className = "mt-8 text-sm font-black text-rose-600 animate-pulse";
            }
        }

        renderCloset();
    </script>
</body>
</html>
